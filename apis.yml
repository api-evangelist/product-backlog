name: Product Backlog
description: A prioritized list of features, enhancements, and fixes that serves as
  the single source of requirements for product development, typically used in Agile
  and Scrum methodologies. Teams use it to align stakeholders, track progress, and
  adapt to changing requirements throughout the project lifecycle.
